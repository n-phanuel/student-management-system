{# students/_profile_row.html — reusable label/value row for profile cards #}
<div class="d-flex border-bottom py-2" style="gap:.5rem">
  <div style="min-width:130px;font-size:.76rem;font-weight:700;color:#94a3b8;
              text-transform:uppercase;letter-spacing:.04em;padding-top:.1rem">
    {{ label }}
  </div>
  <div style="font-size:.875rem;font-weight:500;color:#1e293b;flex:1">
    {{ value }}
  </div>
</div>
